name: PR Style Bot

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  style:
    uses: huggingface/huggingface_hub/.github/workflows/style-bot-action.yml@bf6d1ba1a4f00e9a287de339650521ab52534392
    with:
      python_quality_dependencies: "[quality]"
    secrets:
      app_id: ${{ secrets.HF_BOT_STYLE_APP_ID }}
      app_private_key: ${{ secrets.HF_BOT_STYLE_SECRET_PEM }}
